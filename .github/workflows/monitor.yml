name: Monitor

on:
  schedule:
    - cron: '*/45 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4
      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Bağımlılıkları yükle
        run: npm install
      - name: Git ayarla
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
      - name: Scripti çalıştır
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.CHAT_ID }}
        run: node scraper.js
      - name: State dosyasını kaydet ve push et
        run: |
          git fetch origin
          git add tekel_state.json
          git diff --staged --quiet || git commit -m "state güncellendi"
          git push origin main || (git pull origin main --rebase && git push origin main)
